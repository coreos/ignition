# Maintained in https://github.com/coreos/repo-templates
# Do not edit downstream.

name: Go
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read

# don't waste job slots on superseded code
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    strategy:
      matrix:
        go-version: [1.25.x, 1.26.x]
        os: [ubuntu-latest]
        include:
          - go-version: 1.26.x
            os: macos-latest
          - go-version: 1.26.x
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Check out repository
      uses: actions/checkout@v6
    - name: Install macOS dependencies
      if: runner.os == 'macOS'
      shell: bash
      run: brew install coreutils
    - name: Check modules
      run: go mod verify
    - name: Test
      shell: bash
      run: ./test
    - name: Check Go formatting (gofmt)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        GO_FILES=$(find . -name '*.go' -not -path "./vendor/*")
        UNFORMATTED_FILES=$(gofmt -l $GO_FILES)
        if [ -n "$UNFORMATTED_FILES" ]; then
          echo "Go files are not formatted. Please run 'gofmt -w .' on your code."
          gofmt -d $UNFORMATTED_FILES
          exit 1
        fi
        echo "All Go files are correctly formatted."
    - name: Run linter
      uses: golangci/golangci-lint-action@v8
      if: runner.os == 'Linux'
      with:
        version: v2.11.3
  regenerate:
    name: Regenerate
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v6
    - name: Set up Go 1.x
      uses: actions/setup-go@v5
      with:
        go-version: 1.26.x
    - name: Regenerate
      run: ./generate
    - name: Check whether generated output is current
      run: |
        if [ -n "$(git status --porcelain docs)" ]; then
          echo "Found local changes after regenerating:"
          git --no-pager diff --color=always docs
          echo "Rerun './generate'."
          exit 1
        fi
